<!DOCTYPE html>
<html>
<head>
 <title>FUTO Course Registration Portal</title>
 <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
 <h1>FUTO Course Registration Portal</h1>
</header>
<section id="login">
 <h2>Student Login</h2>
 <input type="text" id="studentId" placeholder="Student ID">
 <input type="password" id="password" placeholder="Password">
 <button onclick="login()">Login</button>
</section>
<section id="dashboard" style="display:none;">
 <h2>Course Registration</h2>
 <select id="semester">
 <option>First Semester</option>
 <option>Second Semester</option>
 </select>
 <h3>Select Courses</h3>
 <div>
 <input type="checkbox"> CSC 309 - Discrete Structures<br>
 <input type="checkbox"> CSC 301 - Data Structures<br>
 <input type="checkbox"> MTH 305 - Linear Algebra<br>
 <input type="checkbox"> STA 307 - Probability
 </div>
 <button onclick="register()">Register Courses</button>
</section>
<script src="script.js"></script>
</body>
   </html>
