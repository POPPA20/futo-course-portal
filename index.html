<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FUTO Course Registration Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="main-header">
    <div class="header-content">
        <img src="futo-logo.png" alt="FUTO Logo" class="logo">
        <div>
            <h1>FEDERAL UNIVERSITY OF TECHNOLOGY, OWERRI</h1>
            <p>Course Registration Portal</p>
        </div>
    </div>
</header>

<section id="login-section" class="card">
    <h2>Student Login</h2>
    <input type="text" id="studentName" placeholder="Enter Full Name">
    <input type="text" placeholder="Matric Number">
    <button onclick="login()">Login</button>
</section>

<section id="dashboard" class="hidden">

    <div class="card">
        <h2>Welcome, <span id="displayName"></span></h2>
        <p>Select your courses below:</p>
    </div>

    <div class="card">
        <h3>Available Courses</h3>

        <label><input type="checkbox" value="3" onchange="calculateCredits()"> CSC 309 - Discrete Structures (3 Units)</label>
        <label><input type="checkbox" value="3" onchange="calculateCredits()"> CSC 301 - Data Structures (3 Units)</label>
        <label><input type="checkbox" value="2" onchange="calculateCredits()"> CIT 401 - Database management systems II (2 Units)</label>
        <label><input type="checkbox" value="3" onchange="calculateCredits()"> CSC 401 - Python programming and machine learning fundamentals (3 Units)</label>
        <label><input type="checkbox" value="2" onchange="calculateCredits()"> CSC 405 - Algorithms and complexity analysis (2 Units)</label>

        <h4>Total Credit Load: <span id="totalCredits">0</span></h4>

        <button onclick="submitRegistration()">Submit Registration</button>
    </div>

</section>

<footer>
    <p>© 2026 FUTO Course Registration System</p>
</footer>

<script src="script.js"></script>
</body>
 </html>
